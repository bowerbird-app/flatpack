name: flatpack-dummy
region: nyc

services:
  - name: dummy-web
    github:
      repo: bowerbird-app/flatpack
      branch: main
      deploy_on_push: false
    source_dir: test/dummy
    environment_slug: ruby
    instance_count: 1
    instance_size_slug: basic-xxs
    http_port: 8080
    build_command: export BUNDLE_GEMFILE=Gemfile.app_platform BUNDLE_WITHOUT=development:test && bundle install && bundle exec rails assets:precompile
    run_command: export BUNDLE_GEMFILE=Gemfile.app_platform BUNDLE_WITHOUT=development:test && bundle exec puma -C config/puma.rb
    health_check:
      http_path: /up
    envs:
      - key: RAILS_ENV
        scope: RUN_AND_BUILD_TIME
        value: production
      - key: BUNDLE_GEMFILE
        scope: RUN_AND_BUILD_TIME
        value: Gemfile.app_platform
      - key: BUNDLE_WITHOUT
        scope: RUN_AND_BUILD_TIME
        value: development:test
      - key: RAILS_SERVE_STATIC_FILES
        scope: RUN_AND_BUILD_TIME
        value: "1"
      - key: RAILS_FORCE_SSL
        scope: RUN_TIME
        value: "true"
      - key: ACTIVE_STORAGE_SERVICE
        scope: RUN_TIME
        value: local
      - key: SECRET_KEY_BASE
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_ME
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_ME
      - key: REDIS_URL
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_ME
      - key: RAILS_MASTER_KEY
        scope: RUN_TIME
        type: SECRET
        value: OPTIONAL_IF_USING_ENCRYPTED_CREDENTIALS

workers:
  - name: dummy-worker
    github:
      repo: bowerbird-app/flatpack
      branch: main
      deploy_on_push: false
    source_dir: test/dummy
    environment_slug: ruby
    instance_count: 1
    instance_size_slug: basic-xxs
    build_command: export BUNDLE_GEMFILE=Gemfile.app_platform BUNDLE_WITHOUT=development:test && bundle install
    run_command: export BUNDLE_GEMFILE=Gemfile.app_platform BUNDLE_WITHOUT=development:test && bundle exec sidekiq -e production -C config/sidekiq.yml
    envs:
      - key: RAILS_ENV
        scope: RUN_AND_BUILD_TIME
        value: production
      - key: BUNDLE_GEMFILE
        scope: RUN_AND_BUILD_TIME
        value: Gemfile.app_platform
      - key: BUNDLE_WITHOUT
        scope: RUN_AND_BUILD_TIME
        value: development:test
      - key: RAILS_FORCE_SSL
        scope: RUN_TIME
        value: "true"
      - key: ACTIVE_STORAGE_SERVICE
        scope: RUN_TIME
        value: local
      - key: SECRET_KEY_BASE
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_ME
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_ME
      - key: REDIS_URL
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_ME
      - key: RAILS_MASTER_KEY
        scope: RUN_TIME
        type: SECRET
        value: OPTIONAL_IF_USING_ENCRYPTED_CREDENTIALS