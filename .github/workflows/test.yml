name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    name: Rails Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          cache-version: 2

      - name: Rebuild native extensions
        run: bundle pristine

      - name: Run tests
        run: bundle exec rails test

  dummy-app:
    name: Dummy App Tests (Rails 8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          cache-version: 2

      - name: Rebuild native extensions
        run: bundle pristine

      - name: Refresh vendored FlatPack snapshot
        working-directory: test/dummy
        run: bin/refresh_flat_pack_vendor

      - name: Install dummy app dependencies
        working-directory: test/dummy
        run: bundle install

      - name: Build Tailwind CSS
        working-directory: test/dummy
        run: bundle exec tailwindcss -c config/tailwind.config.js -i app/assets/stylesheets/application.css -o app/assets/builds/application.css

      - name: Verify dummy app can boot
        working-directory: test/dummy
        run: |
          bundle exec rails runner "puts 'Rails app loaded successfully'"
          echo "Dummy app verified successfully"

  dummy-app-rails-7:
    name: Dummy App Tests (Rails 7)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: test/dummy-rails-7
          cache-version: 2

      - name: Set up database
        working-directory: test/dummy-rails-7
        run: bundle exec rails db:create db:schema:load

      - name: Verify Rails 7 dummy app can boot
        working-directory: test/dummy-rails-7
        run: |
          bundle exec rails runner "puts 'Rails ' + Rails::VERSION::STRING + ' loaded. FlatPack: ' + FlatPack::VERSION"
          echo "Rails 7 dummy app verified successfully"

      - name: Run Rails 7 dummy app tests
        working-directory: test/dummy-rails-7
        run: bundle exec rails test

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          cache-version: 2

      - name: Rebuild native extensions
        run: bundle pristine

      - name: Run RuboCop
        run: bundle exec rubocop

